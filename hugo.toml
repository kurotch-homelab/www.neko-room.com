        [[params.projects.list]]
        title = "Vote-matching system for the student council election"
        meta = "Vote-matching system development team | 2025.04 - 2025.10"
        tagline = "At N High School Group - the largest online high school in Japan - I worked with a team to develop and operate a vote-matching system. The project was funded by the student council through a grant-based initiative to address the challenge that the large number of candidates made it difficult for students to review every profile before voting."

        [[params.projects.list]]
        title = "WP-based Single Sign-On System for High School Students"
        meta = "Knowledge base Executive Committee | 2024.12 - 2026.03"
        tagline = "I developed a identity and access management system with single sign-on (SSO) functionality for high school students using WordPress. The system was designed to provide a seamless login experience across multiple WordPress sites used for different purposes, such as knowledgebases, school festival information, and sandbox environments for editors. It was implemented using WordPress Plugins and operated at N High School Group, the largest online high school in Japan, until the number of WordPress sites in use decreased and the system was retired."

        [[params.projects.list]]
        title = "AI study"
        meta = "AI study Team | 2023.12 - Present"
        tagline = "AI study is a learning service designed to help students consolidate their English vocabulary through fill-in-the-blank questions generated by LLM, accompanied by detailed explanations for each question. It was selected for the MITOU Junior 2024, an initiative aimed at fostering young tech creators in Japan."

        [[params.projects.list]]
        title = "Entrance and Exit Management System"
        meta = "Individual Project | 2023.11"
        tagline = "I developed this web-based application to study Laravel. Guests can enter their name and contact information from the link in the invitation email they received before coming to the event, so that they can be identified smoothly by simply holding up the QR code at the venue, and administrators can easily check who was invited and who entered and left at what time and minute."

        [[params.projects.list]]
        title = "WordPress Plugin Release Management Tool"
        meta = "Individual Project | 2023.06"
        tagline = "Simplify the release flow for WordPress plugins used only in specific environments. Incorporates a code owner approval flow using a Slack Bot for use with private repositories on free plans where branch protection cannot be enforced."

