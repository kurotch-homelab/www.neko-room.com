
                            <section class="project-section py-3">

                                <h3 class="text-uppercase resume-section-heading mb-4">{{ i18n "projects" }}</h3>

                                {{ range .Site.Params.projects.list }}
                                <div class="item mb-3">
                                    <div class="item-heading row align-items-center mb-2">
                                        <h4 class="item-title col-12 col-md-6 col-lg-7 mb-2 mb-md-0">{{ .title }}</h4>
                                        <div class="item-meta col-12 col-md-6 col-lg-5 text-muted text-left text-md-right">
                                            {{- $parts := split .meta " | " -}}
                                            {{- if eq (len $parts) 2 -}}
                                                <span class="item-meta-org">{{ index $parts 0 }}</span>
                                                <span class="text-nowrap">| {{ index $parts 1 }}</span>
                                            {{- else -}}
                                                {{ .meta }}
                                            {{- end -}}
                                        </div>
                                    </div>
                                    <div class="item-content">
                                        <p>{{ .tagline }}</p>
                                    </div>
                                </div><!--//item-->
                                {{ end }}

                            </section><!--//project-section-->
